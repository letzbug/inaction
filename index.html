<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>UniPop in Action</title>

<style>
:root{
  --text:#f4f7ff;
}

body{
  margin:0;
  font-family:Inter, system-ui;
  color:var(--text);
  background:#07111f;
}

/* HERO */
.hero{
  position:relative;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:url('assets/hero.jpg') center/cover;
  z-index:0;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(180deg, rgba(0,0,0,.3), rgba(0,0,0,.7));
  z-index:1;
}

.hero-inner{
  position:relative;
  z-index:2;
  text-align:center;
  max-width:800px;
}

/* FLOATING BADGE */
.hero-floating{
  position:absolute;
  right:3%;
  top:18%;
  z-index:3;
}

/* NEW CLEAN STYLE */
.countdown-card{
  padding:18px 22px;
  border-radius:26px;
  background:linear-gradient(135deg, rgba(88,166,255,.35), rgba(127,109,255,.35));
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.2);
  box-shadow:0 20px 50px rgba(0,0,0,.3);
  text-align:center;
  min-width:220px;

  animation:float 6s ease-in-out infinite, pulse 3s ease-in-out infinite;
}

.countdown-date{
  font-size:2.2rem;
  font-weight:900;
}

.countdown-time{
  font-size:1.1rem;
  opacity:.9;
  margin-top:4px;
}

.countdown-sub{
  margin-top:10px;
  font-size:.95rem;
  opacity:.85;
}

/* ANIMATIONS */
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}

@keyframes pulse{
  0%,100%{box-shadow:0 20px 50px rgba(0,0,0,.3)}
  50%{box-shadow:0 25px 60px rgba(120,120,255,.4)}
}

/* TEXT */
h1{
  font-size:5rem;
  margin:0;
}

p{
  font-size:1.2rem;
  line-height:1.6;
}

/* MOBILE */
@media (max-width:900px){
  .hero-floating{
    position:relative;
    top:auto;
    right:auto;
    margin-top:30px;
  }
}
</style>
</head>

<body>

<section class="hero">

  <!-- FLOATING -->
  <div class="hero-floating">
    <div class="countdown-card">
      <div class="countdown-date">8 MAI</div>
      <div class="countdown-time">11h00 — 18h00</div>
      <div class="countdown-sub" id="countdown">Dans ...</div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="hero-inner">
    <h1>UniPop in Action</h1>
    <p>
      Le 8 mai, de 11h00 à 18h00, découvrez l’univers UniPop à travers une journée vivante, inspirante et immersive.
    </p>
  </div>

</section>

<script>
function updateCountdown(){
  const now = new Date();
  const event = new Date(now.getFullYear(), 4, 8, 11, 0, 0);

  if(now > event){
    event.setFullYear(event.getFullYear()+1);
  }

  const diff = event - now;
  const days = Math.ceil(diff / (1000*60*60*24));

  document.getElementById("countdown").innerText = "Dans " + days + " jours";
}

updateCountdown();
setInterval(updateCountdown, 60000);
</script>

</body>
</html>
